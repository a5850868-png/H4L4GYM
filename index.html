<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>單字遊戲</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --ink: #1f2933;
      --muted: #6b7280;
      --panel: #ffffff;
      --line: #d8d1c4;
      --accent: #1f7a8c;
      --accent-dark: #165f6e;
      --ok: #2f855a;
      --bad: #c2410c;
      --tile: #f1ede5;
      --shadow: 0 12px 30px rgba(31, 41, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(31, 122, 140, 0.12), transparent 30rem),
        linear-gradient(135deg, #f7f4ee 0%, #edf4f6 100%);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, minmax(86px, 1fr));
      gap: 8px;
      min-width: min(100%, 320px);
    }

    .score {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      text-align: center;
    }

    .score span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .score strong {
      display: block;
      margin-top: 4px;
      font-size: 1.35rem;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 18px;
      align-items: start;
    }

    .game,
    .tools {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    .game {
      padding: 22px;
    }

    .tools {
      padding: 18px;
    }

    .question-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e4f1f4;
      color: var(--accent-dark);
      font-weight: 700;
      white-space: nowrap;
    }

    .prompt {
      min-height: 190px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--tile);
      text-align: center;
      padding: 22px;
    }

    .prompt-word {
      margin: 0;
      font-size: clamp(2.4rem, 8vw, 6rem);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .prompt-hint {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .choice {
      min-height: 72px;
      border: 2px solid transparent;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: inset 0 0 0 1px var(--line);
      color: var(--ink);
      cursor: pointer;
      font-size: 1.08rem;
      font-weight: 700;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .choice:hover,
    .choice:focus-visible {
      border-color: var(--accent);
      outline: none;
      transform: translateY(-1px);
    }

    .choice.correct {
      border-color: var(--ok);
      background: #e8f6ef;
    }

    .choice.wrong {
      border-color: var(--bad);
      background: #fff0e8;
    }

    .feedback {
      min-height: 30px;
      margin: 16px 0 0;
      font-weight: 700;
    }

    .feedback.ok {
      color: var(--ok);
    }

    .feedback.bad {
      color: var(--bad);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .primary,
    .secondary {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 800;
    }

    .primary {
      background: var(--accent);
      color: #ffffff;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
    }

    .tools h2 {
      margin: 0 0 12px;
      font-size: 1.2rem;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
    }

    textarea {
      min-height: 240px;
      padding: 10px;
      resize: vertical;
      line-height: 1.45;
    }

    input {
      min-height: 40px;
      padding: 8px 10px;
    }

    .small {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .list {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      border-radius: 999px;
      background: #eef2f2;
      padding: 5px 9px;
      font-size: 0.82rem;
      color: #374151;
    }

    @media (max-width: 840px) {
      header,
      main {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
        align-items: start;
      }

      .scoreboard {
        width: 100%;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 20px, 1120px);
        padding: 16px 0;
      }

      .game,
      .tools {
        padding: 14px;
      }

      .question-row,
      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .choice {
        min-height: 62px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>單字遊戲</h1>
        <p class="subtitle">貼上單字與中文意思，產生可直接練習的選擇題。</p>
      </div>
      <section class="scoreboard" aria-label="分數">
        <div class="score"><span>題號</span><strong id="round">1</strong></div>
        <div class="score"><span>答對</span><strong id="correctCount">0</strong></div>
        <div class="score"><span>正確率</span><strong id="accuracy">0%</strong></div>
      </section>
    </header>

    <main>
      <section class="game" aria-label="遊戲區">
        <div class="question-row">
          <span class="badge" id="modeBadge">英文選中文</span>
          <button class="secondary" id="swapMode" type="button">切換題型</button>
        </div>

        <div class="prompt">
          <div>
            <p class="prompt-word" id="promptWord">baseball</p>
            <p class="prompt-hint" id="promptHint">請選出正確意思</p>
          </div>
        </div>

        <div class="choices" id="choices"></div>
        <p class="feedback" id="feedback" aria-live="polite"></p>

        <div class="actions">
          <button class="primary" id="nextQuestion" type="button">下一題</button>
          <button class="secondary" id="restart" type="button">重新開始</button>
          <button class="secondary" id="shuffle" type="button">洗牌</button>
        </div>
      </section>

      <aside class="tools" aria-label="單字設定">
        <h2>單字庫</h2>
        <label for="wordInput">每行一組，格式：英文,中文</label>
        <textarea id="wordInput" spellcheck="false">baseball,棒球
basketball,籃球
ping-pong,桌球
soccer,足球
football,美式足球
badminton,羽毛球
volleyball,排球
bowling,保齡球
golf,高爾夫球
tennis,網球
jogging,慢跑
gymnastics,體操</textarea>
        <p class="small">也可使用 Tab、冒號或破折號分隔，例如：school 學校。</p>

        <label for="questionCount">題目數</label>
        <input id="questionCount" type="number" min="1" max="100" value="10">

        <div class="actions">
          <button class="primary" id="applyWords" type="button">產生遊戲</button>
          <button class="secondary" id="sampleWords" type="button">範例單字</button>
        </div>

        <div class="list" id="wordChips" aria-label="目前單字"></div>
      </aside>
    </main>
  </div>

  <script>
    const sampleWords = [
      ["baseball", "棒球"],
      ["basketball", "籃球"],
      ["ping-pong", "桌球"],
      ["soccer", "足球"],
      ["football", "美式足球"],
      ["badminton", "羽毛球"],
      ["volleyball", "排球"],
      ["bowling", "保齡球"],
      ["golf", "高爾夫球"],
      ["tennis", "網球"],
      ["jogging", "慢跑"],
      ["gymnastics", "體操"]
    ];

    const state = {
      words: sampleWords.slice(),
      queue: [],
      current: null,
      answerMode: "en-to-zh",
      answered: false,
      round: 1,
      correct: 0,
      totalAnswered: 0
    };

    const els = {
      round: document.querySelector("#round"),
      correctCount: document.querySelector("#correctCount"),
      accuracy: document.querySelector("#accuracy"),
      modeBadge: document.querySelector("#modeBadge"),
      swapMode: document.querySelector("#swapMode"),
      promptWord: document.querySelector("#promptWord"),
      promptHint: document.querySelector("#promptHint"),
      choices: document.querySelector("#choices"),
      feedback: document.querySelector("#feedback"),
      nextQuestion: document.querySelector("#nextQuestion"),
      restart: document.querySelector("#restart"),
      shuffle: document.querySelector("#shuffle"),
      wordInput: document.querySelector("#wordInput"),
      questionCount: document.querySelector("#questionCount"),
      applyWords: document.querySelector("#applyWords"),
      sampleWords: document.querySelector("#sampleWords"),
      wordChips: document.querySelector("#wordChips")
    };

    function parseWords(text) {
      return text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => {
          const parts = line.split(/\s*(?:,|\t|：|:|－|-)\s*/);
          if (parts.length >= 2) return [parts[0].trim(), parts.slice(1).join("-").trim()];

          const fallback = line.match(/^(.+?)\s+(.+)$/);
          return fallback ? [fallback[1].trim(), fallback[2].trim()] : null;
        })
        .filter((pair) => pair && pair[0] && pair[1]);
    }

    function shuffleArray(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildQueue() {
      const desired = Math.max(1, Number.parseInt(els.questionCount.value, 10) || state.words.length);
      const repeated = [];
      while (repeated.length < desired) {
        repeated.push(...shuffleArray(state.words));
      }
      state.queue = repeated.slice(0, desired);
    }

    function makeChoices(correctPair) {
      const answerIndex = state.answerMode === "en-to-zh" ? 1 : 0;
      const correctAnswer = correctPair[answerIndex];
      const distractors = shuffleArray(state.words)
        .map((pair) => pair[answerIndex])
        .filter((answer) => answer !== correctAnswer)
        .slice(0, 3);

      while (distractors.length < 3) {
        distractors.push("再想想");
      }

      return shuffleArray([correctAnswer, ...distractors]);
    }

    function renderQuestion() {
      if (!state.queue.length) {
        buildQueue();
        state.round = 1;
      }

      state.current = state.queue.shift();
      state.answered = false;
      const promptIndex = state.answerMode === "en-to-zh" ? 0 : 1;
      const answerIndex = state.answerMode === "en-to-zh" ? 1 : 0;

      els.modeBadge.textContent = state.answerMode === "en-to-zh" ? "英文選中文" : "中文選英文";
      els.promptHint.textContent = state.answerMode === "en-to-zh" ? "請選出正確意思" : "請選出正確英文";
      els.promptWord.textContent = state.current[promptIndex];
      els.feedback.textContent = "";
      els.feedback.className = "feedback";
      els.choices.innerHTML = "";

      makeChoices(state.current).forEach((choice) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        button.textContent = choice;
        button.addEventListener("click", () => answer(choice, state.current[answerIndex], button));
        els.choices.appendChild(button);
      });

      renderScore();
    }

    function answer(choice, correctAnswer, selectedButton) {
      if (state.answered) return;
      state.answered = true;
      state.totalAnswered += 1;

      const isCorrect = choice === correctAnswer;
      if (isCorrect) state.correct += 1;

      [...els.choices.children].forEach((button) => {
        if (button.textContent === correctAnswer) button.classList.add("correct");
      });
      if (!isCorrect) selectedButton.classList.add("wrong");

      els.feedback.textContent = isCorrect ? "答對了" : `答案是：${correctAnswer}`;
      els.feedback.className = `feedback ${isCorrect ? "ok" : "bad"}`;
      renderScore();
    }

    function renderScore() {
      const accuracy = state.totalAnswered ? Math.round((state.correct / state.totalAnswered) * 100) : 0;
      els.round.textContent = String(state.round);
      els.correctCount.textContent = String(state.correct);
      els.accuracy.textContent = `${accuracy}%`;
    }

    function renderWordChips() {
      els.wordChips.innerHTML = "";
      state.words.slice(0, 20).forEach(([word, meaning]) => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = `${word} / ${meaning}`;
        els.wordChips.appendChild(chip);
      });
    }

    function resetGame({ keepWords = true } = {}) {
      if (!keepWords) state.words = sampleWords.slice();
      state.round = 1;
      state.correct = 0;
      state.totalAnswered = 0;
      buildQueue();
      renderWordChips();
      renderQuestion();
    }

    els.nextQuestion.addEventListener("click", () => {
      state.round += 1;
      renderQuestion();
    });

    els.restart.addEventListener("click", () => resetGame());

    els.shuffle.addEventListener("click", () => {
      buildQueue();
      renderQuestion();
    });

    els.swapMode.addEventListener("click", () => {
      state.answerMode = state.answerMode === "en-to-zh" ? "zh-to-en" : "en-to-zh";
      renderQuestion();
    });

    els.applyWords.addEventListener("click", () => {
      const parsed = parseWords(els.wordInput.value);
      if (parsed.length < 4) {
        els.feedback.textContent = "請至少輸入 4 組單字，才能產生選擇題。";
        els.feedback.className = "feedback bad";
        return;
      }
      state.words = parsed;
      resetGame();
    });

    els.sampleWords.addEventListener("click", () => {
      els.wordInput.value = sampleWords.map((pair) => pair.join(",")).join("\n");
      resetGame({ keepWords: false });
    });

    resetGame();
  </script>
</body>
</html>

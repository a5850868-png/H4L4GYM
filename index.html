<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Word Master Playground</title>
  <style>
    :root {
      --sky: #7dd3fc;
      --grass: #65a30d;
      --sun: #facc15;
      --ink: #1f2937;
      --panel: #fff7ed;
      --panel-2: #ecfeff;
      --blue: #2563eb;
      --red: #ef4444;
      --green: #16a34a;
      --orange: #f97316;
      --purple: #9333ea;
      --shadow: rgba(15, 23, 42, .18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", "Noto Sans TC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 14% 10%, #fde68a 0 7rem, transparent 7.2rem),
        linear-gradient(#7dd3fc 0 62%, #86efac 62% 100%);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px clamp(10px, 2vw, 24px) 20px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .sprite {
      width: clamp(58px, 10vw, 82px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: #fef3c7;
      border: 5px solid #f59e0b;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 0 #b45309, 0 14px 24px var(--shadow);
      position: relative;
      animation: bob 1.8s ease-in-out infinite;
    }

    .sprite::before {
      content: "★";
      color: #f97316;
      font-size: clamp(28px, 5vw, 42px);
      transform: rotate(-12deg);
    }

    .title {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 5vw, 3rem);
      line-height: .98;
      color: #0f172a;
      text-shadow: 0 3px 0 #fde68a;
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: clamp(.85rem, 2.2vw, 1.05rem);
      font-weight: 800;
      color: #075985;
    }

    .hud {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .score,
    .hearts,
    .timer {
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 3px solid #0f172a;
      background: #ffffff;
      box-shadow: 0 5px 0 #0f172a;
      font-size: clamp(.95rem, 2.3vw, 1.15rem);
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .hearts span {
      color: var(--red);
      letter-spacing: 1px;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .mode-btn,
    .big-btn,
    .choice,
    .letter,
    .tool-btn {
      border: 3px solid #0f172a;
      border-radius: 8px;
      background: #fff;
      color: #111827;
      font-weight: 900;
      box-shadow: 0 6px 0 #0f172a;
      cursor: pointer;
      touch-action: manipulation;
    }

    .mode-btn {
      min-height: 54px;
      padding: 8px;
      font-size: clamp(.82rem, 2.2vw, 1rem);
      display: grid;
      place-items: center;
    }

    .mode-btn.active {
      background: #fef08a;
      transform: translateY(3px);
      box-shadow: 0 3px 0 #0f172a;
    }

    .stage {
      position: relative;
      min-height: min(68vh, 650px);
      border: 5px solid #0f172a;
      border-radius: 12px;
      background:
        linear-gradient(transparent 0 62%, rgba(34, 197, 94, .25) 62% 100%),
        radial-gradient(circle at 83% 19%, #fef3c7 0 48px, transparent 50px),
        linear-gradient(#bae6fd, #e0f2fe 58%, #bbf7d0 58%);
      box-shadow: 0 10px 0 #0f172a, 0 18px 28px var(--shadow);
      overflow: hidden;
      padding: clamp(12px, 2.5vw, 22px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      bottom: 10px;
      width: 180px;
      height: 65px;
      background:
        linear-gradient(90deg, transparent 0 20px, #7c2d12 20px 30px, transparent 30px 55px, #7c2d12 55px 65px, transparent 65px),
        linear-gradient(#f97316 0 13px, transparent 13px);
      opacity: .35;
      pointer-events: none;
    }

    .stage::before {
      left: 18px;
      transform: rotate(-2deg);
    }

    .stage::after {
      right: 18px;
      transform: rotate(2deg) scaleX(-1);
    }

    .scene-head {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .prompt {
      min-height: 82px;
      padding: 12px;
      border-radius: 8px;
      border: 4px solid #0f172a;
      background: var(--panel);
      box-shadow: 0 6px 0 #0f172a;
      display: grid;
      align-content: center;
      gap: 3px;
    }

    .prompt small {
      color: #0369a1;
      font-weight: 900;
      font-size: clamp(.78rem, 2vw, .95rem);
    }

    .prompt strong {
      font-size: clamp(1.25rem, 4.7vw, 2.45rem);
      line-height: 1.06;
      overflow-wrap: anywhere;
    }

    .tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tool-btn {
      min-width: 56px;
      min-height: 52px;
      padding: 8px 10px;
      background: #dbeafe;
      font-size: 1.2rem;
    }

    .tool-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0f172a;
    }

    .arena {
      position: relative;
      z-index: 1;
      display: grid;
      align-items: center;
      min-height: 360px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(8px, 2vw, 14px);
    }

    .choice {
      position: relative;
      min-height: clamp(88px, 17vh, 150px);
      padding: 10px;
      background: #fff;
      display: grid;
      place-items: center;
      gap: 4px;
      transition: transform .08s ease, background .12s ease;
    }

    .choice:active,
    .big-btn:active,
    .letter:active,
    .tool-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0f172a;
    }

    .choice.correct {
      background: #bbf7d0;
    }

    .choice.wrong {
      background: #fecaca;
    }

    .pic {
      font-size: clamp(2rem, 8vw, 4.5rem);
      line-height: 1;
    }

    .word {
      font-size: clamp(1rem, 3.4vw, 1.65rem);
      line-height: 1.05;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .meaning {
      font-size: clamp(.8rem, 2.1vw, 1rem);
      color: #475569;
      font-weight: 900;
    }

    .spelling {
      display: grid;
      gap: 14px;
      align-content: center;
      justify-items: center;
      min-height: 100%;
    }

    .hang-area {
      width: min(430px, 100%);
      min-height: 180px;
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 14px;
      align-items: center;
      padding: 14px;
      border: 4px solid #0f172a;
      border-radius: 8px;
      background: rgba(255, 255, 255, .76);
      box-shadow: 0 6px 0 #0f172a;
    }

    .gallows {
      width: 130px;
      height: 150px;
      position: relative;
    }

    .gallows i {
      position: absolute;
      display: block;
      background: #7c2d12;
      border-radius: 4px;
    }

    .base { left: 12px; bottom: 0; width: 105px; height: 10px; }
    .post { left: 32px; top: 8px; width: 10px; height: 138px; }
    .beam { left: 32px; top: 8px; width: 76px; height: 10px; }
    .rope { left: 100px; top: 16px; width: 5px; height: 28px; }

    .person {
      position: absolute;
      left: 72px;
      top: 41px;
      width: 60px;
      height: 95px;
    }

    .part {
      position: absolute;
      opacity: 0;
      transition: opacity .2s ease;
    }

    .part.show {
      opacity: 1;
    }

    .head {
      left: 16px;
      top: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 5px solid #1f2937;
      background: #fde68a;
    }

    .body {
      left: 31px;
      top: 34px;
      width: 6px;
      height: 34px;
      background: #1f2937;
      border-radius: 6px;
    }

    .arm-l,
    .arm-r,
    .leg-l,
    .leg-r {
      width: 6px;
      height: 34px;
      background: #1f2937;
      border-radius: 6px;
      transform-origin: top center;
    }

    .arm-l { left: 31px; top: 39px; transform: rotate(48deg); }
    .arm-r { left: 31px; top: 39px; transform: rotate(-48deg); }
    .leg-l { left: 31px; top: 64px; transform: rotate(32deg); }
    .leg-r { left: 31px; top: 64px; transform: rotate(-32deg); }

    .answer-box {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .blanks {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      font-size: clamp(1.15rem, 4vw, 2.15rem);
      font-weight: 900;
    }

    .blank {
      min-width: 28px;
      height: 42px;
      display: grid;
      place-items: end center;
      border-bottom: 5px solid #0f172a;
      text-transform: uppercase;
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 7px;
      width: min(720px, 100%);
    }

    .letter {
      min-height: 46px;
      background: #fef9c3;
      text-transform: uppercase;
    }

    .letter.used {
      opacity: .42;
      pointer-events: none;
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0f172a;
    }

    .timed-grid {
      display: grid;
      gap: 12px;
      align-content: center;
      justify-items: center;
    }

    .big-word {
      width: min(720px, 100%);
      min-height: 120px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 12px;
      border: 5px solid #0f172a;
      border-radius: 10px;
      background: #f0fdf4;
      box-shadow: 0 8px 0 #0f172a;
      font-size: clamp(1.6rem, 8vw, 4.2rem);
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .big-btn {
      min-height: 58px;
      padding: 10px 18px;
      background: #fef08a;
      font-size: clamp(1rem, 3vw, 1.35rem);
    }

    .message {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 5;
      transform: translateX(-50%) translateY(120px);
      min-width: min(560px, calc(100vw - 24px));
      padding: 14px 18px;
      border: 4px solid #0f172a;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 8px 0 #0f172a;
      text-align: center;
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 900;
      transition: transform .22s ease;
    }

    .message.show {
      transform: translateX(-50%) translateY(0);
    }

    .win {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      padding: 16px;
      background: rgba(15, 23, 42, .42);
    }

    .win.show {
      display: grid;
    }

    .win-card {
      width: min(620px, 100%);
      border: 6px solid #0f172a;
      border-radius: 14px;
      background: #fff7ed;
      box-shadow: 0 12px 0 #0f172a;
      padding: clamp(18px, 5vw, 34px);
      text-align: center;
      display: grid;
      justify-items: center;
      gap: 14px;
    }

    .badge {
      width: clamp(138px, 38vw, 210px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fde68a 0 48%, #f59e0b 49% 64%, #b45309 65%);
      border: 6px solid #0f172a;
      box-shadow: 0 8px 0 #0f172a;
      display: grid;
      place-items: center;
      color: #0f172a;
      font-size: clamp(1.05rem, 4.5vw, 1.65rem);
      font-weight: 900;
      line-height: 1.05;
      text-transform: uppercase;
    }

    .win h2 {
      margin: 0;
      font-size: clamp(2rem, 9vw, 4.8rem);
      line-height: .92;
      color: #16a34a;
      text-shadow: 0 4px 0 #bbf7d0;
    }

    .footer {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      font-size: .86rem;
      font-weight: 900;
      color: #064e3b;
    }

    .hidden {
      display: none !important;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(3deg); }
    }

    @media (max-width: 760px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .hud {
        justify-content: stretch;
      }

      .score,
      .hearts,
      .timer {
        flex: 1;
        justify-content: center;
      }

      .mode-tabs {
        grid-template-columns: repeat(2, 1fr);
      }

      .scene-head {
        grid-template-columns: 1fr;
      }

      .tools {
        justify-content: stretch;
      }

      .tool-btn {
        flex: 1;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 640px;
      }

      .hang-area {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .keyboard {
        grid-template-columns: repeat(6, 1fr);
      }
    }

    @media (max-width: 420px) {
      .keyboard {
        grid-template-columns: repeat(5, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <section class="brand" aria-label="遊戲名稱">
        <div class="sprite" aria-hidden="true"></div>
        <div class="title">
          <h1>Word Master Playground</h1>
          <p class="subtitle">小三英文單字闖關</p>
        </div>
      </section>
      <section class="hud" aria-label="分數與生命">
        <div class="score">分數 <b id="score">0</b>/100</div>
        <div class="hearts">愛心 <span id="hearts">♥♥♥</span></div>
        <div class="timer hidden" id="timerBox">時間 <b id="timer">60</b></div>
      </section>
    </header>

    <nav class="mode-tabs" aria-label="遊戲模式">
      <button class="mode-btn active" data-mode="match">圖字配對</button>
      <button class="mode-btn" data-mode="listen">聽音選字</button>
      <button class="mode-btn" data-mode="spell">拼字吊死人</button>
      <button class="mode-btn" data-mode="timed">限時挑戰</button>
    </nav>

    <section class="stage" aria-live="polite">
      <div class="scene-head">
        <div class="prompt">
          <small id="modeLabel">圖字配對</small>
          <strong id="promptText">找出這張圖的英文單字</strong>
        </div>
        <div class="tools">
          <button class="tool-btn" id="speakBtn" title="播放英文發音" aria-label="播放英文發音">🔊</button>
          <button class="tool-btn" id="nextBtn" title="換下一題" aria-label="換下一題">▶</button>
          <button class="tool-btn" id="resetBtn" title="重新開始" aria-label="重新開始">↺</button>
        </div>
      </div>
      <div class="arena" id="arena"></div>
    </section>

    <footer class="footer">
      <span>答對 +10 分</span>
      <span>答錯 -1 顆愛心</span>
      <span>滿 100 分過關</span>
    </footer>
  </main>

  <div class="message" id="message"></div>

  <div class="win" id="win">
    <div class="win-card">
      <div class="badge">Word<br>Master</div>
      <h2>Great Job!</h2>
      <button class="big-btn" id="playAgain">再玩一次</button>
    </div>
  </div>

  <script>
    const words = [
      ["baseball", "棒球", "⚾"],
      ["basketball", "籃球", "🏀"],
      ["ping-pong", "桌球", "🏓"],
      ["soccer", "足球", "⚽"],
      ["football", "美式足球", "🏈"],
      ["badminton", "羽毛球", "🏸"],
      ["volleyball", "排球", "🏐"],
      ["bowling", "保齡球", "🎳"],
      ["golf", "高爾夫球", "⛳"],
      ["tennis", "網球", "🎾"],
      ["jogging", "慢跑", "🏃"],
      ["gymnastics", "體操", "🤸"],
      ["out", "外面", "🚪"],
      ["house", "房子", "🏠"],
      ["mouse", "老鼠", "🐭"],
      ["mouth", "嘴巴", "👄"],
      ["count", "數數", "🔢"],
      ["couch", "沙發", "🛋️"],
      ["cloud", "雲", "☁️"],
      ["shout", "大叫", "📣"],
      ["cow", "牛", "🐄"],
      ["how", "如何", "❓"],
      ["owl", "貓頭鷹", "🦉"],
      ["bow", "鞠躬", "🙇"],
      ["down", "向下", "⬇️"],
      ["brown", "棕色", "🟫"],
      ["clown", "小丑", "🤡"],
      ["now", "現在", "⏰"]
    ].map(([word, zh, icon]) => ({ word, zh, icon }));

    const state = {
      mode: "match",
      score: 0,
      hearts: 3,
      current: null,
      timer: 60,
      timerId: null,
      hangMisses: 0,
      guessed: new Set(),
      timedDone: 0,
      timedOver: false,
      recentWords: {
        match: [],
        listen: [],
        spell: [],
        timed: []
      }
    };

    const $ = (id) => document.getElementById(id);
    const arena = $("arena");
    const scoreEl = $("score");
    const heartsEl = $("hearts");
    const timerBox = $("timerBox");
    const timerEl = $("timer");
    const modeLabel = $("modeLabel");
    const promptText = $("promptText");
    const message = $("message");
    const win = $("win");
    const nextBtn = $("nextBtn");
    const speakBtn = $("speakBtn");

    const modeNames = {
      match: "圖字配對",
      listen: "聽音選字",
      spell: "拼字吊死人",
      timed: "限時挑戰"
    };

    function sample(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function shuffle(list) {
      return [...list].sort(() => Math.random() - 0.5);
    }

    function clearRecentWords() {
      state.recentWords = {
        match: [],
        listen: [],
        spell: [],
        timed: []
      };
    }

    function setCurrent(word) {
      if (word) {
        state.current = word;
        return;
      }

      const recent = state.recentWords[state.mode] || [];
      const recentSet = new Set(recent);
      const available = words.filter((item) => !recentSet.has(item.word));
      state.current = sample(available.length ? available : words);

      recent.push(state.current.word);
      while (recent.length > 10) recent.shift();
      state.recentWords[state.mode] = recent;
    }

    function optionsFor(answer, count = 4) {
      const pool = shuffle(words.filter((item) => item.word !== answer.word)).slice(0, count - 1);
      return shuffle([answer, ...pool]);
    }

    function updateHud() {
      scoreEl.textContent = state.score;
      heartsEl.textContent = "♥".repeat(state.hearts) || "♡";
      timerEl.textContent = state.timer;
      timerBox.classList.toggle("hidden", state.mode !== "timed");
    }

    function updateTools() {
      const mustAnswerToAdvance = state.mode === "match" || state.mode === "listen";
      nextBtn.disabled = mustAnswerToAdvance || (state.mode === "timed" && state.timedOver);
      nextBtn.title = mustAnswerToAdvance ? "答對後才會進下一題" : "換下一題";
      nextBtn.setAttribute("aria-label", nextBtn.title);
      speakBtn.title = state.mode === "listen" ? "播放題目英文發音" : "播放目前單字發音";
      speakBtn.setAttribute("aria-label", speakBtn.title);
    }

    function showMessage(text, good = true) {
      message.textContent = text;
      message.style.background = good ? "#dcfce7" : "#fee2e2";
      message.classList.add("show");
      clearTimeout(showMessage.id);
      showMessage.id = setTimeout(() => message.classList.remove("show"), 1200);
    }

    function englishVoice() {
      if (!("speechSynthesis" in window)) return null;
      const voices = speechSynthesis.getVoices();
      return voices.find((voice) => voice.lang && voice.lang.toLowerCase().startsWith("en-us"))
        || voices.find((voice) => voice.lang && voice.lang.toLowerCase().startsWith("en"))
        || null;
    }

    function speak(text = state.current?.word) {
      if (!text) return;
      if (!("speechSynthesis" in window) || !("SpeechSynthesisUtterance" in window)) {
        showMessage("這個瀏覽器不支援朗讀", false);
        return;
      }

      speechSynthesis.cancel();
      if (speechSynthesis.paused) speechSynthesis.resume();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.82;
      utterance.pitch = 1.05;
      const voice = englishVoice();
      if (voice) utterance.voice = voice;
      utterance.onerror = () => showMessage("手機請開啟音量，並再按一次喇叭", false);

      setTimeout(() => {
        speechSynthesis.speak(utterance);
      }, 40);
    }

    function award() {
      state.score = Math.min(100, state.score + 10);
      updateHud();
      if (state.score >= 100 && state.mode !== "timed") {
        stopTimer();
        setTimeout(() => win.classList.add("show"), 420);
      }
    }

    function miss(text = "再試一次") {
      state.hearts -= 1;
      if (state.hearts <= 0) {
        state.hearts = 3;
        state.score = Math.max(0, state.score - 10);
        showMessage("愛心補滿，分數 -10", false);
      } else {
        showMessage(text, false);
      }
      updateHud();
    }

    function answerChoice(btn, picked) {
      if (state.mode === "timed" && state.timedOver) return;
      const isCorrect = picked.word === state.current.word;
      btn.classList.add(isCorrect ? "correct" : "wrong");
      if (isCorrect) {
        if (state.mode === "timed") {
          state.timedDone += 1;
          state.score = Math.min(100, state.score + 10);
          updateHud();
          showMessage("答對了！+10", true);
          setTimeout(() => {
            if (!state.timedOver) renderTimed();
          }, 650);
          return;
        }
        showMessage("答對了！+10", true);
        award();
        setTimeout(renderMode, 650);
      } else {
        miss(`答案是 ${state.current.word}`);
      }
    }

    function renderChoices(opts, showIcon, showZh) {
      const wrap = document.createElement("div");
      wrap.className = "choices";
      opts.forEach((item) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.innerHTML = `
          ${showIcon ? `<span class="pic">${item.icon}</span>` : ""}
          <span class="word">${item.word}</span>
          ${showZh ? `<span class="meaning">${item.zh}</span>` : ""}
        `;
        btn.addEventListener("click", () => answerChoice(btn, item), { once: true });
        wrap.appendChild(btn);
      });
      arena.replaceChildren(wrap);
    }

    function renderMatch() {
      setCurrent();
      promptText.innerHTML = `<span class="pic">${state.current.icon}</span> ${state.current.zh}`;
      renderChoices(optionsFor(state.current), false, false);
    }

    function renderListen() {
      setCurrent();
      promptText.textContent = "按喇叭聽英文發音，選出正確單字";
      renderChoices(optionsFor(state.current), false, true);
    }

    function renderSpell() {
      setCurrent();
      state.hangMisses = 0;
      state.guessed = new Set();
      promptText.textContent = `${state.current.zh} ${state.current.icon}`;
      drawSpelling();
    }

    function visibleLetters() {
      return state.current.word.split("").map((char) => {
        if (!/[a-z]/i.test(char)) return char;
        return state.guessed.has(char.toLowerCase()) ? char : "";
      });
    }

    function drawSpelling() {
      const letters = "abcdefghijklmnopqrstuvwxyz".split("");
      const visible = visibleLetters();
      const solved = visible.join("").toLowerCase() === state.current.word.toLowerCase();
      const box = document.createElement("div");
      box.className = "spelling";
      box.innerHTML = `
        <div class="hang-area">
          <div class="gallows" aria-hidden="true">
            <i class="base"></i><i class="post"></i><i class="beam"></i><i class="rope"></i>
            <div class="person">
              <span class="part head ${state.hangMisses > 0 ? "show" : ""}"></span>
              <span class="part body ${state.hangMisses > 1 ? "show" : ""}"></span>
              <span class="part arm-l ${state.hangMisses > 2 ? "show" : ""}"></span>
              <span class="part arm-r ${state.hangMisses > 3 ? "show" : ""}"></span>
              <span class="part leg-l ${state.hangMisses > 4 ? "show" : ""}"></span>
              <span class="part leg-r ${state.hangMisses > 5 ? "show" : ""}"></span>
            </div>
          </div>
          <div class="answer-box">
            <div class="pic">${state.current.icon}</div>
            <div class="meaning">${state.current.zh}</div>
            <div class="blanks">
              ${visible.map((char) => `<span class="blank">${char === " " ? "&nbsp;" : char}</span>`).join("")}
            </div>
          </div>
        </div>
        <div class="keyboard">
          ${letters.map((letter) => `<button class="letter ${state.guessed.has(letter) ? "used" : ""}" data-letter="${letter}">${letter}</button>`).join("")}
        </div>
      `;
      arena.replaceChildren(box);
      box.querySelectorAll(".letter").forEach((btn) => {
        btn.addEventListener("click", () => guessLetter(btn.dataset.letter));
      });
      if (solved) completeSpelling();
    }

    function guessLetter(letter) {
      state.guessed.add(letter);
      if (!state.current.word.toLowerCase().includes(letter)) {
        state.hangMisses += 1;
        if (state.hangMisses >= 6) {
          miss(`答案是 ${state.current.word}`);
          setTimeout(renderSpell, 700);
          return;
        }
      }
      drawSpelling();
    }

    function completeSpelling() {
      showMessage("拼對了！+10", true);
      award();
      setTimeout(renderSpell, 850);
    }

    function renderTimed() {
      if (state.timedOver) {
        renderTimedResult();
        return;
      }
      if (!state.timerId) startTimer();
      setCurrent();
      promptText.textContent = `限時挑戰：60 秒內完成幾題？目前 ${state.timedDone} 題`;
      const grid = document.createElement("div");
      grid.className = "timed-grid";
      const prompt = document.createElement("div");
      prompt.className = "big-word";
      prompt.innerHTML = `${state.current.icon}<br>${state.current.zh}`;
      grid.appendChild(prompt);
      const choiceWrap = document.createElement("div");
      choiceWrap.className = "choices";
      optionsFor(state.current).forEach((item) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.innerHTML = `<span class="word">${item.word}</span>`;
        btn.addEventListener("click", () => answerChoice(btn, item), { once: true });
        choiceWrap.appendChild(btn);
      });
      grid.appendChild(choiceWrap);
      arena.replaceChildren(grid);
    }

    function startTimer() {
      state.timer = 60;
      state.timedOver = false;
      state.timedDone = 0;
      updateHud();
      state.timerId = setInterval(() => {
        state.timer -= 1;
        updateHud();
        if (state.timer <= 0) {
          stopTimer();
          state.timer = 0;
          state.timedOver = true;
          updateHud();
          showMessage("時間到！挑戰結束", false);
          renderTimedResult();
        }
      }, 1000);
    }

    function renderTimedResult() {
      updateTools();
      promptText.textContent = `時間到！你完成 ${state.timedDone} 題`;
      const result = document.createElement("div");
      result.className = "timed-grid";
      result.innerHTML = `
        <div class="big-word">
          ⏰<br>
          完成 ${state.timedDone} 題
        </div>
        <div class="meaning">限時挑戰已結束，按 ↺ 可以重新開始。</div>
      `;
      arena.replaceChildren(result);
      arena.querySelectorAll("button").forEach((btn) => {
        btn.disabled = true;
      });
    }

    function stopTimer() {
      clearInterval(state.timerId);
      state.timerId = null;
    }

    function renderMode() {
      if (state.score >= 100 && state.mode !== "timed") return;
      modeLabel.textContent = modeNames[state.mode];
      updateHud();
      updateTools();
      if (state.mode !== "timed") stopTimer();
      if (state.mode === "match") renderMatch();
      if (state.mode === "listen") renderListen();
      if (state.mode === "spell") renderSpell();
      if (state.mode === "timed") renderTimed();
    }

    function resetGame(keepMode = true) {
      stopTimer();
      state.score = 0;
      state.hearts = 3;
      state.timer = 60;
      state.hangMisses = 0;
      state.guessed = new Set();
      state.timedDone = 0;
      state.timedOver = false;
      clearRecentWords();
      win.classList.remove("show");
      if (!keepMode) state.mode = "match";
      document.querySelectorAll(".mode-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === state.mode);
      });
      renderMode();
    }

    document.querySelectorAll(".mode-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        state.mode = btn.dataset.mode;
        document.querySelectorAll(".mode-btn").forEach((item) => item.classList.remove("active"));
        btn.classList.add("active");
        resetGame(true);
      });
    });

    speakBtn.addEventListener("click", () => speak());
    nextBtn.addEventListener("click", () => {
      if (!nextBtn.disabled) renderMode();
    });
    $("resetBtn").addEventListener("click", () => resetGame(true));
    $("playAgain").addEventListener("click", () => resetGame(true));

    renderMode();
  </script>
</body>
</html>
